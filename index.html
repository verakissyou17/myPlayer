<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./myPlayer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap"
      rel="stylesheet"
    />
    <title>My player</title>
  </head>

  <body>
    <div class="container">
      <section class="player">
        <article class="player-bar">
          <h1 class="title">Music Player</h1>
        </article>
        <article class="player-content">
          <div class="cover">
            <img
              src="./images/AlinaEremia-SaFiiFericit.jpg"
              alt="Background image"
            />
          </div>
          <div class="player-display-info">
            <div class="song-information">
              <p class="artist-name"></p>
              <p class="song-name"></p>
            </div>
            <div class="progress-container">
              <div class="progress"></div>
            </div>

            <div class="player-buttons">
              <button class="controls prev">
                <i class="fas fa-backward"></i>
              </button>
              <button class="controls play">
                <i class="fas fa-play"></i>
              </button>
              <button class="controls pause">
                <i class="fas fa-pause"></i>
              </button>
              <button class="controls next">
                <i class="fas fa-forward"></i>
              </button>
            </div>
          </div>
        </article>
      </section>
      <section class="playlist">
        <div class="playlist-bar">
          <h2 class="playlist-title" class="playlist-title">Playlist</h2>
        </div>
        <ul class="playlist-songs"></ul>
      </section>
    </div>

    <script type="module" src="./myPlayer.js"></script>
  </body>
</html>
